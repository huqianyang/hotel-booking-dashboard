agent.sources = bookingSource
agent.channels = memoryChannel
agent.sinks = kafkaSink

agent.sources.bookingSource.type = exec
agent.sources.bookingSource.command = tail -F /data/events/booking_events.log
agent.sources.bookingSource.channels = memoryChannel

agent.channels.memoryChannel.type = memory
agent.channels.memoryChannel.capacity = 10000
agent.channels.memoryChannel.transactionCapacity = 1000

agent.sinks.kafkaSink.type = org.apache.flume.sink.kafka.KafkaSink
agent.sinks.kafkaSink.channel = memoryChannel
agent.sinks.kafkaSink.kafka.bootstrap.servers = kafka:9092
agent.sinks.kafkaSink.kafka.topic = hotel-booking-events
agent.sinks.kafkaSink.brokerList = kafka:9092
agent.sinks.kafkaSink.topic = hotel-booking-events
agent.sinks.kafkaSink.kafka.flumeBatchSize = 100
agent.sinks.kafkaSink.kafka.producer.acks = 1
